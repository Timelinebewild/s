<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💀📱 The Timeline Be Wild</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0b0f1a;
  font-family: Arial, sans-serif;
}

.page {
  max-width: 480px;
  margin: auto;
}

.title {
  color: #ffffff;
  font-size: 18px;
  font-weight: 700;
  padding: 15px 15px 5px;
}

.desc {
  color: #9aa4b2;
  font-size: 13px;
  padding: 0 15px 10px;
}

.video-box {
  position: relative;
}

video {
  width: 100%;
  max-height: 75vh;
  object-fit: contain;
  background: #000;
}

.loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #cbd5e1;
}

.cta {
  display: block;
  margin: 15px;
  text-align: center;
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: #fff;
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
}

.rec-title {
  color: #e2e8f0;
  font-size: 16px;
  font-weight: bold;
  padding: 15px;
}

.native-wrap {
  display: flex;
  justify-content: center;
  padding: 10px;
}

.banner-300 {
  display: flex;
  justify-content: center;
  padding: 20px 0;
}
</style>
</head>

<body>

<div class="page">

<div class="title">
This Clip Is Going Viral For A Reason 👀
</div>

<div class="desc">
People are talking about this everywhere. Watch and decide for yourself what really happened.
</div>

<div class="video-box">
<div class="loading" id="loading">Loading video...</div>

<video 
id="player"
controls
muted
playsinline
preload="metadata"
poster="https://via.placeholder.com/480x720?text=Loading"
controlsList="nodownload noremoteplayback"
disablePictureInPicture
>
<source id="videoSource" src="" type="video/mp4">
</video>
</div>

<a href="#" class="cta" id="ctaBtn">
▶ Continue Watching
</a>

<!-- BANNER ATAS -->
<div class="banner-300">
<script>
  var atOptions = {
    'key' : 'ca4ea2c14dbde05405fa08bd6e7bb612',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://brewdismaychest.com/ca4ea2c14dbde05405fa08bd6e7bb612/invoke.js"></script>
</div>

<div class="rec-title">🔥 Trending Videos</div>

<!-- NATIVE BAWAH -->
<div class="native-wrap">
<script async="async" data-cfasync="false" src="https://brewdismaychest.com/e93c0137aaa96ed8325629fb6b33e330/invoke.js"></script>
<div id="container-e93c0137aaa96ed8325629fb6b33e330"></div>
</div>

</div>

<script>
(function () {

const params = new URLSearchParams(window.location.search);
let video = params.get("v");

if (!video) {
  video = "https://cdn.videy.co/AAU8a62J1.mp4";
}

if (!video.startsWith("http")) {
  video = "https://cdn.videy.co/" + video;
}

const player = document.getElementById("player");
const source = document.getElementById("videoSource");
const loading = document.getElementById("loading");
const cta = document.getElementById("ctaBtn");

source.src = video;
player.load();

player.play().catch(() => {});

player.addEventListener("loadeddata", () => {
  loading.style.display = "none";
});

player.addEventListener("contextmenu", e => e.preventDefault());

cta.addEventListener("click", function(e){
  e.preventDefault();
  window.location.href = "https://thetimelinebewilds.blogspot.com/";
});

})();
</script>

</body>
</html>
